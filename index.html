<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockAI Advisor</title>
    <style>
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f9fafb;
        --color-border-primary: #d1d5db;
        --color-border-secondary: #e5e7eb;
        --color-border-tertiary: #f3f4f6;
        --color-text-primary: #111827;
        --color-text-secondary: #4b5563;
        --color-text-tertiary: #9ca3af;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: var(--font-sans); background: #f3f4f6; padding: 20px; display: flex; justify-content: center; }
      
      #app { 
        width: 100%;
        max-width: 500px;
        display: flex; 
        flex-direction: column; 
        height: 600px; 
        border: 0.5px solid var(--color-border-primary); 
        border-radius: var(--border-radius-lg); 
        overflow: hidden; 
        background: var(--color-background-primary); 
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      #header { padding: 14px 18px; border-bottom: 0.5px solid var(--color-border-secondary); display: flex; align-items: center; gap: 10px; background: var(--color-background-secondary); }
      #header .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
      #header h2 { font-size: 15px; font-weight: 600; color: var(--color-text-primary); }
      #header span { font-size: 12px; color: var(--color-text-secondary); margin-left: auto; }

      #chips { display: flex; gap: 6px; padding: 10px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); overflow-x: auto; flex-shrink: 0; background: var(--color-background-primary); }
      #chips::-webkit-scrollbar { display: none; }
      .chip { font-size: 12px; padding: 6px 12px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
      .chip:hover { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); }

      #messages { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 12px; background: #fff; }
      .msg { display: flex; flex-direction: column; max-width: 85%; }
      .msg.user { align-self: flex-end; align-items: flex-end; }
      .msg.bot { align-self: flex-start; align-items: flex-start; }
      .bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
      .msg.user .bubble { background: #1a56db; color: #fff; border-bottom-right-radius: 4px; }
      .msg.bot .bubble { background: var(--color-background-secondary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary); border-bottom-left-radius: 4px; }
      .msg-label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; font-weight: 500; }

      .signal { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 99px; margin-top: 8px; text-transform: uppercase; }
      .signal.buy { background: #dcfce7; color: #15803d; }
      .signal.sell { background: #fee2e2; color: #b91c1c; }
      .signal.hold { background: #fef9c3; color: #854d0e; }

      .typing { display: flex; gap: 4px; padding: 10px 0; }
      .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-tertiary); animation: bounce 1.4s infinite ease-in-out; }
      .typing span:nth-child(2) { animation-delay: 0.2s; }
      .typing span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

      #input-row { display: flex; gap: 8px; padding: 12px 14px; border-top: 0.5px solid var(--color-border-secondary); background: #fff; }
      #input-row input { flex: 1; padding: 10px 14px; border-radius: var(--border-radius-md); border: 1px solid var(--color-border-primary); font-size: 14px; outline: none; }
      #input-row input:focus { border-color: #1a56db; ring: 2px solid #1a56db; }
      #send-btn { padding: 0 16px; background: #1a56db; color: #fff; border: none; border-radius: var(--border-radius-md); font-size: 14px; cursor: pointer; font-weight: 600; }
      #send-btn:disabled { opacity: 0.5; }

      .disclaimer { font-size: 10px; color: var(--color-text-tertiary); text-align: center; padding: 8px 14px; background: #fff; border-bottom-left-radius: var(--border-radius-lg); border-bottom-right-radius: var(--border-radius-lg); }
    </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="dot"></div>
    <h2>StockAI Advisor</h2>
    <span>Live Analysis</span>
  </div>
  <div id="chips">
    <div class="chip" onclick="sendChip('Should I buy NVDA?')">Should I buy NVDA?</div>
    <div class="chip" onclick="sendChip('Is AAPL a good investment?')">Is AAPL a good investment?</div>
    <div class="chip" onclick="sendChip('Compare TSLA vs F')">TSLA vs Ford</div>
    <div class="chip" onclick="sendChip('Top AI stocks 2025')">AI Stocks 2025</div>
  </div>
  <div id="messages">
    <div class="msg bot">
      <div class="msg-label">StockAI</div>
      <div class="bubble">Hello! I'm your AI stock analyst. I provide technical and fundamental insights. Ask me about any ticker.<br><br><strong>Example:</strong> "Analyze MSFT"</div>
    </div>
  </div>
  <div id="input-row">
    <input id="user-input" type="text" placeholder="Type ticker or question..." onkeydown="if(event.key==='Enter') sendMessage()" />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
  <div class="disclaimer">⚠️ For educational purposes only. Not financial advice.</div>
</div>

<script>
const history = [];
const API_KEY = "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";
const SYSTEM_PROMPT = `You are StockAI, a sharp stock market analyst. 
Rules:
1. Provide a concise analysis (3-5 sentences).
2. Use financial metrics (P/E, growth, etc.) or market trends.
3. ALWAYS end with a recommendation in this exact format on a new line: SIGNAL: BUY (or SELL or HOLD).
4. Do not give personal financial advice.`;

async function callGroq(userMsg) {
  // Add to local history
  history.push({ role: "user", content: userMsg });
  
  const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${API_KEY}`
    },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      messages: [
        { role: "system", content: SYSTEM_PROMPT },
        ...history
      ],
      temperature: 0.7
    })
  });

  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  
  const text = data.choices[0].message.content;
  history.push({ role: "assistant", content: text });
  return text;
}

function extractSignal(text) {
  const m = text.match(/SIGNAL:\s*(BUY|SELL|HOLD)/i);
  return m ? m[1].toUpperCase() : null;
}

function formatBubble(text) {
  const signal = extractSignal(text);
  const cleaned = text.replace(/SIGNAL:\s*(BUY|SELL|HOLD)/gi, "").trim();
  let html = cleaned.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>").replace(/\n/g, "<br>");
  
  if (signal) {
    const cls = signal.toLowerCase();
    const icons = { BUY: "📈", SELL: "📉", HOLD: "⏸" };
    html += `<br><span class="signal ${cls}">${icons[signal]} ${signal}</span>`;
  }
  return html;
}

function addMsg(role, content, isHTML = false) {
  const container = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-label">${role === "user" ? "You" : "StockAI"}</div>
    <div class="bubble">${isHTML ? content : content.replace(/</g,"&lt;")}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("user-input");
  const btn = document.getElementById("send-btn");
  const text = input.value.trim();
  
  if (!text) return;
  
  input.value = "";
  btn.disabled = true;
  addMsg("user", text);
  
  // Show typing indicator
  const typingId = "typing-" + Date.now();
  const container = document.getElementById("messages");
  const tDiv = document.createElement("div");
  tDiv.id = typingId;
  tDiv.className = "msg bot";
  tDiv.innerHTML = `<div class="msg-label">StockAI</div><div class="bubble typing"><span></span><span></span><span></span></div>`;
  container.appendChild(tDiv);
  container.scrollTop = container.scrollHeight;

  try {
    const reply = await callGroq(text);
    document.getElementById(typingId).remove();
    addMsg("bot", formatBubble(reply), true);
  } catch(e) {
    document.getElementById(typingId).remove();
    addMsg("bot", "Error connecting to Groq. Check your API key or connection.");
    console.error(e);
  }
  
  btn.disabled = false;
}

function sendChip(text) {
  document.getElementById("user-input").value = text;
  sendMessage();
}
</script>
</body>
</html>
